<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Data KTP</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ECE7D1;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #8A7650;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border: 1px solid #8A7650;
            margin-bottom: 25px;
        }

        .form-container h2 {
            color: #8A7650;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 1px solid #8A7650;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #8A7650;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #8A7650;
            font-size: 14px;
            background-color: #fff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #8A7650;
            box-shadow: 0 0 3px #8A7650;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #8A7650;
            color: #ECE7D1;
        }

        .btn-primary:hover {
            background-color: #6e5d3f;
        }

        .btn-secondary {
            background-color: #ECE7D1;
            color: #8A7650;
            border: 1px solid #8A7650;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background-color: #ddd8c4;
        }

        .btn-edit {
            background-color: #8A7650;
            color: #ECE7D1;
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-edit:hover {
            background-color: #6e5d3f;
        }

        .btn-delete {
            background-color: #ECE7D1;
            color: #8A7650;
            border: 1px solid #8A7650;
            padding: 5px 12px;
            font-size: 12px;
            margin-left: 5px;
        }

        .btn-delete:hover {
            background-color: #ddd8c4;
        }

        .btn-group {
            margin-top: 15px;
        }

        .table-container {
            background: #fff;
            padding: 25px;
            border: 1px solid #8A7650;
            overflow-x: auto;
        }

        .table-container h2 {
            color: #8A7650;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 1px solid #8A7650;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #8A7650;
            color: #ECE7D1;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #8A7650;
        }

        th {
            font-weight: bold;
            font-size: 13px;
        }

        tbody tr:hover {
            background-color: #ECE7D1;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            font-size: 14px;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.success {
            background-color: #8A7650;
            color: #ECE7D1;
        }

        .notification.error {
            background-color: #ECE7D1;
            color: #8A7650;
            border: 1px solid #8A7650;
        }

        .notification.info {
            background-color: #8A7650;
            color: #ECE7D1;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 3px solid #ECE7D1;
            border-top: 3px solid #8A7650;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #8A7650;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            th, td {
                padding: 8px;
                font-size: 12px;
            }
        }

        .action-col {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistem Manajemen Data KTP</h1>

        <div class="form-container">
            <h2 id="formTitle">Tambah Data KTP Baru</h2>
            <form id="ktpForm">
                <input type="hidden" id="ktpId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nomorKtp">Nomor KTP *</label>
                        <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit Nomor KTP" maxlength="16" required>
                    </div>
                    <div class="form-group">
                        <label for="namaLengkap">Nama Lengkap *</label>
                        <input type="text" id="namaLengkap" placeholder="Masukkan Nama Lengkap" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="tanggalLahir">Tanggal Lahir *</label>
                        <input type="date" id="tanggalLahir" required>
                    </div>
                    <div class="form-group">
                        <label for="jenisKelamin">Jenis Kelamin *</label>
                        <select id="jenisKelamin" required>
                            <option value="">-- Pilih Jenis Kelamin --</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="alamat">Alamat *</label>
                    <textarea id="alamat" rows="3" placeholder="Masukkan Alamat Lengkap" required></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Simpan Data</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display: none;">Batal</button>
                </div>
            </form>
        </div>

        <div class="table-container">
            <h2>Daftar Data KTP</h2>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Memuat data...</p>
            </div>
            <table id="ktpTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nomor KTP</th>
                        <th>Nama Lengkap</th>
                        <th>Alamat</th>
                        <th>Tanggal Lahir</th>
                        <th>Jenis Kelamin</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="ktpTableBody">
                </tbody>
            </table>
            <div class="no-data" id="noData" style="display: none;">
                Belum ada data KTP. Silakan tambahkan data baru.
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/ktp';

        $(document).ready(function() {
            loadKtpData();

            $('#ktpForm').on('submit', function(e) {
                e.preventDefault();
                const id = $('#ktpId').val();

                if (id) {
                    updateKtp(id);
                } else {
                    createKtp();
                }
            });

            $('#cancelBtn').on('click', function() {
                resetForm();
            });
        });

        function showNotification(message, type) {
            $('.notification').remove();
            const notification = $('<div class="notification ' + type + '">' + message + '</div>');
            $('body').append(notification);

            setTimeout(function() {
                notification.fadeOut(300, function() {
                    $(this).remove();
                });
            }, 3000);
        }

        function formatDateDisplay(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('id-ID', options);
        }

        function formatDateInput(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }

        function loadKtpData() {
            $('#loading').show();
            $('#ktpTable').hide();
            $('#noData').hide();

            $.ajax({
                url: API_URL,
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    $('#loading').hide();

                    if (data.length === 0) {
                        $('#noData').show();
                        $('#ktpTable').hide();
                    } else {
                        $('#noData').hide();
                        $('#ktpTable').show();
                        renderTable(data);
                    }
                },
                error: function(xhr, status, error) {
                    $('#loading').hide();
                    $('#noData').show();
                    showNotification('Gagal memuat data: ' + error, 'error');
                }
            });
        }

        function renderTable(data) {
            const tbody = $('#ktpTableBody');
            tbody.empty();

            data.forEach(function(ktp, index) {
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${ktp.nomorKtp || '-'}</td>
                        <td>${ktp.namaLengkap || '-'}</td>
                        <td>${ktp.alamat || '-'}</td>
                        <td>${formatDateDisplay(ktp.tanggalLahir)}</td>
                        <td>${ktp.jenisKelamin || '-'}</td>
                        <td class="action-col">
                            <button class="btn btn-edit" onclick="editKtp(${ktp.id})">Edit</button>
                            <button class="btn btn-delete" onclick="deleteKtp(${ktp.id}, '${ktp.namaLengkap}')">Hapus</button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function createKtp() {
            const ktpData = {
                nomorKtp: $('#nomorKtp').val().trim(),
                namaLengkap: $('#namaLengkap').val().trim(),
                alamat: $('#alamat').val().trim(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            if (!validateForm(ktpData)) {
                return;
            }

            $('#submitBtn').prop('disabled', true).text('Menyimpan...');

            $.ajax({
                url: API_URL,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(ktpData),
                success: function(response) {
                    showNotification('Data KTP berhasil ditambahkan!', 'success');
                    resetForm();
                    loadKtpData();
                },
                error: function(xhr, status, error) {
                    let errorMsg = 'Gagal menambahkan data';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        errorMsg = xhr.responseJSON.message;
                    }
                    showNotification(errorMsg, 'error');
                },
                complete: function() {
                    $('#submitBtn').prop('disabled', false).text('Simpan Data');
                }
            });
        }

        function editKtp(id) {
            $.ajax({
                url: API_URL + '/' + id,
                type: 'GET',
                dataType: 'json',
                success: function(ktp) {
                    $('#ktpId').val(ktp.id);
                    $('#nomorKtp').val(ktp.nomorKtp);
                    $('#namaLengkap').val(ktp.namaLengkap);
                    $('#alamat').val(ktp.alamat);
                    $('#tanggalLahir').val(formatDateInput(ktp.tanggalLahir));
                    $('#jenisKelamin').val(ktp.jenisKelamin);

                    $('#formTitle').text('Edit Data KTP');
                    $('#submitBtn').text('Update Data');
                    $('#cancelBtn').show();

                    $('html, body').animate({
                        scrollTop: $('.form-container').offset().top - 20
                    }, 500);

                    showNotification('Mode edit aktif', 'info');
                },
                error: function(xhr, status, error) {
                    showNotification('Gagal mengambil data: ' + error, 'error');
                }
            });
        }

        function updateKtp(id) {
            const ktpData = {
                nomorKtp: $('#nomorKtp').val().trim(),
                namaLengkap: $('#namaLengkap').val().trim(),
                alamat: $('#alamat').val().trim(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            if (!validateForm(ktpData)) {
                return;
            }

            $('#submitBtn').prop('disabled', true).text('Mengupdate...');

            $.ajax({
                url: API_URL + '/' + id,
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify(ktpData),
                success: function(response) {
                    showNotification('Data KTP berhasil diperbarui!', 'success');
                    resetForm();
                    loadKtpData();
                },
                error: function(xhr, status, error) {
                    let errorMsg = 'Gagal memperbarui data';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        errorMsg = xhr.responseJSON.message;
                    }
                    showNotification(errorMsg, 'error');
                },
                complete: function() {
                    $('#submitBtn').prop('disabled', false).text('Update Data');
                }
            });
        }

        function deleteKtp(id, nama) {
            if (confirm('Apakah Anda yakin ingin menghapus data KTP atas nama "' + nama + '"?')) {
                $.ajax({
                    url: API_URL + '/' + id,
                    type: 'DELETE',
                    success: function() {
                        showNotification('Data KTP berhasil dihapus!', 'success');
                        loadKtpData();
                    },
                    error: function(xhr, status, error) {
                        let errorMsg = 'Gagal menghapus data';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            errorMsg = xhr.responseJSON.message;
                        }
                        showNotification(errorMsg, 'error');
                    }
                });
            }
        }

        function validateForm(data) {
            if (!data.nomorKtp || data.nomorKtp.length !== 16) {
                showNotification('Nomor KTP harus 16 digit!', 'error');
                $('#nomorKtp').focus();
                return false;
            }

            if (!/^\d+$/.test(data.nomorKtp)) {
                showNotification('Nomor KTP hanya boleh berisi angka!', 'error');
                $('#nomorKtp').focus();
                return false;
            }

            if (!data.namaLengkap) {
                showNotification('Nama Lengkap harus diisi!', 'error');
                $('#namaLengkap').focus();
                return false;
            }

            if (!data.alamat) {
                showNotification('Alamat harus diisi!', 'error');
                $('#alamat').focus();
                return false;
            }

            if (!data.tanggalLahir) {
                showNotification('Tanggal Lahir harus diisi!', 'error');
                $('#tanggalLahir').focus();
                return false;
            }

            if (!data.jenisKelamin) {
                showNotification('Jenis Kelamin harus dipilih!', 'error');
                $('#jenisKelamin').focus();
                return false;
            }

            return true;
        }

        function resetForm() {
            $('#ktpForm')[0].reset();
            $('#ktpId').val('');
            $('#formTitle').text('Tambah Data KTP Baru');
            $('#submitBtn').text('Simpan Data');
            $('#cancelBtn').hide();
        }
    </script>
</body>
</html>
